<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="6. Live Mode Visual Iteration">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#211f20"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#211f20" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f8f4ef"/>
  <text x="80" y="92" font-family="Cormorant Garamond, Georgia, serif" font-size="54" font-weight="400" fill="#211f20" text-anchor="start" style="font-style:italic">6. Live Mode Visual Iteration</text>
<text x="82" y="134" font-family="Instrument Sans, Arial, sans-serif" font-size="22" font-weight="400" fill="#6d6667" text-anchor="start" style="">Users judge variants on the rendered page, then the accepted variant is baked into source.</text>
<line x1="80" y1="170" x2="1520" y2="170" stroke="#d8ceca" stroke-width="2"/>
  <circle cx="145" cy="250" r="52" fill="#f7d8e8" stroke="#d1197a" stroke-width="3"/>
<text x="145" y="340" font-family="Instrument Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#211f20" text-anchor="middle" style="">User</text>
<line x1="145" y1="370" x2="145" y2="820" stroke="#d8ceca" stroke-width="3" stroke-dasharray="8 10"/>
<circle cx="460" cy="250" r="52" fill="#fffdf9" stroke="#d8ceca" stroke-width="3"/>
<text x="460" y="340" font-family="Instrument Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#211f20" text-anchor="middle" style="">Browser</text>
<line x1="460" y1="370" x2="460" y2="820" stroke="#d8ceca" stroke-width="3" stroke-dasharray="8 10"/>
<circle cx="775" cy="250" r="52" fill="#fffdf9" stroke="#d8ceca" stroke-width="3"/>
<text x="775" y="340" font-family="Instrument Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#211f20" text-anchor="middle" style="">Helper server</text>
<line x1="775" y1="370" x2="775" y2="820" stroke="#d8ceca" stroke-width="3" stroke-dasharray="8 10"/>
<circle cx="1090" cy="250" r="52" fill="#fffdf9" stroke="#d8ceca" stroke-width="3"/>
<text x="1090" y="340" font-family="Instrument Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#211f20" text-anchor="middle" style="">Agent</text>
<line x1="1090" y1="370" x2="1090" y2="820" stroke="#d8ceca" stroke-width="3" stroke-dasharray="8 10"/>
<circle cx="1405" cy="250" r="52" fill="#fffdf9" stroke="#d8ceca" stroke-width="3"/>
<text x="1405" y="340" font-family="Instrument Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#211f20" text-anchor="middle" style="">Project source</text>
<line x1="1405" y1="370" x2="1405" y2="820" stroke="#d8ceca" stroke-width="3" stroke-dasharray="8 10"/>
<line x1="145" y1="410" x2="460" y2="410" stroke="#d1197a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="302" y="395" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#6d6667" text-anchor="middle" style="">select element</text>
<line x1="460" y1="490" x2="775" y2="490" stroke="#211f20" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="617" y="475" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#6d6667" text-anchor="middle" style="">generate event</text>
<line x1="1090" y1="570" x2="775" y2="570" stroke="#211f20" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="932" y="555" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#6d6667" text-anchor="middle" style="">poll event</text>
<line x1="1090" y1="650" x2="1405" y2="650" stroke="#16835a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="1247" y="635" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#6d6667" text-anchor="middle" style="">wrap and write variants</text>
<line x1="1405" y1="725" x2="460" y2="725" stroke="#2468b2" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="932" y="710" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#6d6667" text-anchor="middle" style="">hot-swap in browser, accept one</text>
<line x1="1090" y1="800" x2="1405" y2="800" stroke="#d1197a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="1247" y="785" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#6d6667" text-anchor="middle" style="">bake accepted source</text>
