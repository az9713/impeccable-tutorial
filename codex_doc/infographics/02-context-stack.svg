<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="2. The Context Stack">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#211f20"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#211f20" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f8f4ef"/>
  <text x="80" y="92" font-family="Cormorant Garamond, Georgia, serif" font-size="54" font-weight="400" fill="#211f20" text-anchor="start" style="font-style:italic">2. The Context Stack</text>
<text x="82" y="134" font-family="Instrument Sans, Arial, sans-serif" font-size="22" font-weight="400" fill="#6d6667" text-anchor="start" style="">Before editing, the agent receives layers of product, design, register, and command context.</text>
<line x1="80" y1="170" x2="1520" y2="170" stroke="#d8ceca" stroke-width="2"/>
  <rect x="260" y="220" width="1080" height="66" rx="12" fill="#fffdf9" stroke="#d1197a" stroke-width="2" opacity="1"/>
<text x="300" y="262" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#d1197a" text-anchor="start" style="">User request</text>
<text x="775" y="262" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">The immediate task</text>
<rect x="288" y="314" width="1024" height="66" rx="12" fill="#fffdf9" stroke="#211f20" stroke-width="2" opacity="1"/>
<text x="328" y="356" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#211f20" text-anchor="start" style="">SKILL.md</text>
<text x="775" y="356" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">Setup gates, shared laws, command menu</text>
<rect x="316" y="408" width="968" height="66" rx="12" fill="#fffdf9" stroke="#2468b2" stroke-width="2" opacity="1"/>
<text x="356" y="450" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#2468b2" text-anchor="start" style="">PRODUCT.md</text>
<text x="775" y="450" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">Users, purpose, voice, anti-references</text>
<rect x="344" y="502" width="912" height="66" rx="12" fill="#fffdf9" stroke="#16835a" stroke-width="2" opacity="1"/>
<text x="384" y="544" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#16835a" text-anchor="start" style="">DESIGN.md</text>
<text x="775" y="544" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">Colors, type, spacing, components</text>
<rect x="372" y="596" width="856" height="66" rx="12" fill="#fffdf9" stroke="#9b6a08" stroke-width="2" opacity="1"/>
<text x="412" y="638" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#9b6a08" text-anchor="start" style="">Register reference</text>
<text x="775" y="638" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">Brand surface or product surface</text>
<rect x="400" y="690" width="800" height="66" rx="12" fill="#fffdf9" stroke="#d1197a" stroke-width="2" opacity="1"/>
<text x="440" y="732" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#d1197a" text-anchor="start" style="">Command reference</text>
<text x="775" y="732" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">The specific design discipline</text>
<rect x="428" y="784" width="744" height="66" rx="12" fill="#f7d8e8" stroke="#211f20" stroke-width="4" opacity="1"/>
<text x="468" y="826" font-family="Instrument Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#211f20" text-anchor="start" style="">Active AI context</text>
<text x="775" y="826" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" fill="#6d6667" text-anchor="start" style="">Specific enough to design with intent</text>
<text x="800" y="905" font-family="Instrument Sans, Arial, sans-serif" font-size="28" font-weight="500" fill="#211f20" text-anchor="middle" style="">Each layer narrows vague taste into an actionable design brief.</text>
</svg>